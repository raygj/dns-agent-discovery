name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"

      - name: Download modules
        run: go mod download

      - name: Unit tests
        run: go test ./... -count=1 -coverprofile=coverage.out

      - name: Coverage check
        run: |
          go tool cover -func=coverage.out | tail -1
          total=$(go tool cover -func=coverage.out | awk '/total:/ {gsub(/%/,"",$3); print $3}')
          echo "Coverage: ${total}%"
          awk -v c="$total" 'BEGIN { exit (c+0 >= 60) ? 0 : 1 }'

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Helm lint
        run: helm lint charts/dns-agent-discovery

      - name: Helm template
        run: helm template dns-agent-discovery charts/dns-agent-discovery --dry-run

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
