# Default values for dns-agent-discovery

namespace: dns-agent-discovery

clusterDomain: cluster.local

etcd:
  image: quay.io/coreos/etcd:v3.5.21
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    port: 2379
    nodePort: 32379

coredns:
  image: coredns/coredns:1.12.0
  replicas: 1
  ttl: 1
  etcdPath: /skydns
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 128Mi
  service:
    port: 53
    nodePort: 30053

rbac:
  create: true

serviceAccount:
  create: true
  name: dns-agent-discovery
