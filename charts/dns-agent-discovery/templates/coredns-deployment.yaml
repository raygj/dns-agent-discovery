apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-coredns
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: dns-agent-discovery
    app.kubernetes.io/component: coredns
spec:
  replicas: {{ .Values.coredns.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: dns-agent-discovery
      app.kubernetes.io/component: coredns
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dns-agent-discovery
        app.kubernetes.io/component: coredns
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      dnsPolicy: ClusterFirst
      containers:
        - name: coredns
          image: {{ .Values.coredns.image }}
          imagePullPolicy: IfNotPresent
          args:
            - -conf
            - /etc/coredns/Corefile
          ports:
            - containerPort: 53
              name: dns
              protocol: UDP
            - containerPort: 53
              name: dns-tcp
              protocol: TCP
            - containerPort: 8080
              name: health
            - containerPort: 9153
              name: metrics
          volumeMounts:
            - name: config
              mountPath: /etc/coredns
          resources:
            {{- toYaml .Values.coredns.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /ready
              port: 8181
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              add:
                - NET_BIND_SERVICE
              drop:
                - ALL
            readOnlyRootFilesystem: true
      volumes:
        - name: config
          configMap:
            name: agent-coredns
